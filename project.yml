name: VexTrainer

# Generated by XcodeGen — do not edit VexTrainer.xcodeproj by hand.
# Run `xcodegen generate` after changing this file.

options:
  bundleIdPrefix: com.vextrainer
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"            # 1 = iPhone, 2 = iPad → universal
    SUPPORTS_MACCATALYST: NO
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_MODULE_VERIFIER: YES
    SWIFT_STRICT_CONCURRENCY: minimal        # Will raise to "complete" in a later phase
    # Code signing — Apple Developer Team ID (Prasad Bodepudi, Individual).
    # Applies to both the app target and the test target. With
    # CODE_SIGN_STYLE = Automatic, Xcode manages certs and provisioning
    # profiles for us; we just need the Team ID and a valid Apple ID
    # signed in via Xcode → Settings → Accounts.
    DEVELOPMENT_TEAM: A2735NYWVW
    CODE_SIGN_STYLE: Automatic

packages:
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: 4.2.2
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: 2.2.0

targets:
  VexTrainer:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "**/.gitkeep"
    resources:
      - Sources/Resources/Assets.xcassets
      - Sources/Resources/PrivacyInfo.xcprivacy
    dependencies:
      - package: KeychainAccess
      - package: MarkdownUI
      - package: Highlightr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vextrainer.ios
        MARKETING_VERSION: "0.7.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: VexTrainer
        # Copyright credit goes to the actual developer. The seller name on
        # the App Store listing is account-wide and stays as the parent's
        # legal name, but the copyright field is per-app and shows under
        # "Information" on the app's App Store page.
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Devesh Bodepudi"
        # Export compliance — VexTrainer uses only Apple's standard system
        # encryption (HTTPS via URLSession, Keychain). All of that is exempt
        # under US export regulations. Declaring NO here means App Store
        # Connect won't ask the export compliance question on every upload.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        GENERATE_INFOPLIST_FILE: YES

  VexTrainerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/VexTrainerTests
        excludes:
          - "**/Fixtures/**"
    resources:
      - Tests/VexTrainerTests/Fixtures
    dependencies:
      - target: VexTrainer
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.vextrainer.ios.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VexTrainer.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/VexTrainer"

schemes:
  VexTrainer:
    build:
      targets:
        VexTrainer: all
        VexTrainerTests: [test]
    test:
      targets:
        - VexTrainerTests
      gatherCoverageData: true
